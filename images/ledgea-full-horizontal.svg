<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <title>Ledgea - Full Logo Horizontal</title>
  <!-- === ICON (scale to fit 52px height) === -->
  <g transform="translate(4, 1) scale(1.8)">
    <!-- Card 3 (back) -->
    <rect x="9" y="3" width="16" height="11" rx="2" fill="#CCFBF1"/>
    <!-- Card 2 (middle) -->
    <rect x="6" y="6" width="16" height="11" rx="2" fill="#5EEAD4"/>
    <!-- Card 1 (front) -->
    <rect x="3" y="9" width="16" height="11" rx="2" fill="#0D9488"/>
    <!-- Ledger lines -->
    <line x1="5.5" y1="12" x2="12.5" y2="12" stroke="rgba(255,255,255,0.5)" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="5.5" y1="14.5" x2="16" y2="14.5" stroke="rgba(255,255,255,0.5)" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="5.5" y1="17" x2="10" y2="17" stroke="rgba(255,255,255,0.5)" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Anchor -->
    <circle cx="11" cy="21.5" r="1.5" fill="none" stroke="#134E4A" stroke-width="1.6"/>
    <line x1="11" y1="23" x2="11" y2="27.5" stroke="#134E4A" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="7.5" y1="25.5" x2="14.5" y2="25.5" stroke="#134E4A" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M7.5 25.5 Q7 28 9 28.5" fill="none" stroke="#134E4A" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M14.5 25.5 Q15 28 13 28.5" fill="none" stroke="#134E4A" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- === WORDMARK === -->
  <text x="76" y="34" font-family="'Plus Jakarta Sans', system-ui, -apple-system, sans-serif" font-weight="600" font-size="30" fill="#134E4A" letter-spacing="-0.5">Ledgea</text>

  <!-- === TAGLINE === -->
  <text x="76" y="48" font-family="'Plus Jakarta Sans', system-ui, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#0D9488" letter-spacing="0.3">The ledger built for Asia's complexity.</text>
</svg>